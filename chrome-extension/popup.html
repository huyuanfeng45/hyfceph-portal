<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HYFCeph Bridge</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div class="logo">H</div>
        <div>
          <h1>HYFCeph Bridge</h1>
          <p>只装在你的电脑上。负责把当前浏览器里的远程会话同步到 HYFCeph 门户。</p>
        </div>
      </header>

      <section class="card">
        <label class="field">
          <span>门户地址</span>
          <input id="portalBaseUrl" type="url" placeholder="https://hyfceph.52ortho.com/" />
        </label>
        <label class="field">
          <span>管理员 API Key</span>
          <textarea id="operatorApiKey" rows="3" placeholder="请填写管理员账号生成的 API Key"></textarea>
        </label>
        <label class="field">
          <span>上游登录账号</span>
          <input id="upstreamUsername" type="text" placeholder="用于登出后自动重新登录" />
        </label>
        <label class="field">
          <span>上游登录密码</span>
          <input id="upstreamPassword" type="password" placeholder="只保存在这台浏览器扩展本地" />
        </label>
        <p class="hint">账号密码只保存在这台 Chrome 扩展本地，用于自动重登，不会上传到门户。</p>
        <div class="inline-settings">
          <label class="switch-field">
            <input id="autoRefreshEnabled" type="checkbox" />
            <span>自动刷新网页</span>
          </label>
          <label class="field compact-field">
            <span>刷新间隔（分钟）</span>
            <input id="autoRefreshMinutes" type="number" min="1" max="240" step="1" />
          </label>
        </div>
        <div class="actions">
          <button id="saveBtn" class="primary" type="button">保存配置</button>
          <button id="syncBtn" type="button">立即同步</button>
        </div>
      </section>

      <section class="card">
        <div class="row">
          <span class="label">当前页面</span>
          <strong id="pageState">检测中</strong>
        </div>
        <div class="row">
          <span class="label">同步状态</span>
          <strong id="syncState">未同步</strong>
        </div>
        <div class="row">
          <span class="label">自动刷新</span>
          <strong id="refreshState">未开启</strong>
        </div>
        <div class="row">
          <span class="label">自动登录</span>
          <strong id="loginState">未配置</strong>
        </div>
        <p id="detail" class="detail">请先打开侧位片网页，并在这里保存管理员 API Key。</p>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
